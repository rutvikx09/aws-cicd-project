version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into Amazon ECR
      - ACCOUNT_ID=729859598203
      - REGION=ap-south-1
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

  build:
    commands:
      - echo Building Docker Image
      - docker build -t aws-cicd-app .
      - docker tag aws-cicd-app:latest $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/aws-cicd-app:latest

  post_build:
    commands:
      - echo Pushing Docker Image
      - docker push $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/aws-cicd-app:latest

artifacts:
  files:
    - Dockerrun.aws.json